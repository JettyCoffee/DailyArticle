name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Stage release package
        run: |
          mkdir -p release/daily-article
          cp main.js manifest.json styles.css release/daily-article/
          cd release
          zip -r daily-article.zip daily-article

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/daily-article.zip
          generate_release_notes: true